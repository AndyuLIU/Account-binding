<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>oásis 身份綁定</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --brand: #2D5A4B;
      --brand-dark: #1d3e34;
      --bg: #f6f9f7;
      --text: #17231f;
      --muted: #64736d;
      --line: #d6e1dc;
      --danger: #b3261e;
      --success: #2D5A4B;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(100%, 480px);
      margin: 0 auto;
      padding: 36px 18px 40px;
    }

    .brand {
      color: var(--brand);
      font-size: 0.85rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 8px;
      color: var(--brand-dark);
      font-size: 2rem;
      line-height: 1.15;
    }

    .lead {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 22px;
      box-shadow: 0 16px 36px rgba(45, 90, 75, 0.12);
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--brand-dark);
      font-weight: 800;
      font-size: 0.95rem;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--white);
      color: var(--text);
      font: inherit;
      padding: 11px 12px;
    }

    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(45, 90, 75, 0.16);
      outline: none;
    }

    button {
      width: 100%;
      min-height: 50px;
      border: 0;
      border-radius: 6px;
      background: var(--brand);
      color: var(--white);
      cursor: pointer;
      font: inherit;
      font-weight: 900;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.7;
    }

    .msg {
      display: none;
      margin-top: 14px;
      border-radius: 6px;
      padding: 12px;
      font-size: 0.94rem;
      font-weight: 700;
      text-align: center;
    }

    .msg.success {
      display: block;
      background: #e6efeb;
      color: var(--success);
    }

    .msg.error {
      display: block;
      background: #fdeceb;
      color: var(--danger);
    }

    .loading {
      display: none;
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    .loading.show {
      display: block;
    }

    footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 0.82rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand">oásis</div>
    <h1>員工身份綁定</h1>
    <p class="lead">請填寫以下資料完成 LINE 帳號綁定，綁定後即可使用請假、公告等功能。</p>

    <section class="card">
      <form id="bindForm">
        <div class="field">
          <label for="name">本名</label>
          <input id="name" name="name" type="text" placeholder="請輸入本名" autocomplete="name" required>
        </div>

        <div class="field">
          <label for="phone">聯絡電話</label>
          <input id="phone" name="phone" type="tel" placeholder="請輸入手機號碼" autocomplete="tel" inputmode="tel" required>
        </div>

        <button id="submitBtn" type="submit">確認綁定</button>
        <div id="loading" class="loading">正在初始化 LINE 資料...</div>
        <div id="msg" class="msg"></div>
      </form>
    </section>

    <footer>© oásis salon</footer>
  </main>

  <script>
    const LIFF_ID = "2010336788-imRmBbp9";
    const WEBHOOK_URL = "https://andy1996.zeabur.app/webhook-test/698ca559-e590-4238-a4a1-45f423978130";

    let lineUserId = "";

    const loading = document.getElementById("loading");
    const form = document.getElementById("bindForm");
    const submitBtn = document.getElementById("submitBtn");
    const msg = document.getElementById("msg");

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = "msg " + type;
    }

    async function initLiff() {
      loading.classList.add("show");

      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const decodedToken = liff.getDecodedIDToken();
        lineUserId = decodedToken && decodedToken.sub ? decodedToken.sub : "";

        if (!lineUserId) {
          throw new Error("LINE user id is unavailable.");
        }
      } catch (e) {
        showMsg("初始化失敗，請關閉後重新開啟。", "error");
      } finally {
        loading.classList.remove("show");
      }
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      if (!lineUserId) {
        showMsg("無法取得 LINE 帳號資訊，請重新開啟頁面。", "error");
        return;
      }

      const name = document.getElementById("name").value.trim();
      const phone = document.getElementById("phone").value.trim();

      if (!name || !phone) {
        showMsg("請填寫所有欄位。", "error");
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = "送出中...";
      msg.className = "msg";

      try {
        const res = await fetch(WEBHOOK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            lineUserId: lineUserId,
            name: name,
            phone: phone
          })
        });

        if (!res.ok) {
          throw new Error("Webhook failed");
        }

        showMsg("綁定資料已送出，請稍候", "success");
        submitBtn.textContent = "已送出";
        form.querySelectorAll("input").forEach((input) => {
          input.disabled = true;
        });
      } catch (e) {
        showMsg("送出失敗，請重試", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "確認綁定";
      }
    });

    initLiff();
  </script>
</body>
</html>
